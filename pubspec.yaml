name: sami_app
description: S.A.M.I. – plataforma multiplataforma con arquitectura modular, Provider y go_router.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  go_router: ^14.2.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_core: ^3.15.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0
  google_fonts: ^6.2.1
  equatable: ^2.0.5
  cryptography: ^2.6.0
  path: ^1.9.0
  http: ^1.2.1
  audioplayers: ^6.5.1
  record: ^6.1.1
  http_parser: ^4.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  path_provider_platform_interface: ^2.0.3
  build_runner: ^2.4.9
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/mocks/
